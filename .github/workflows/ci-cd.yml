name: CI/CD — Build, Test, Prod

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ─── 1. Build + push de l'image Docker ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    # On build+push uniquement sur push réel (pas sur PR)
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ororck/quiz-live:latest
            ororck/quiz-live:${{ github.sha }}

  # ─── 2. Deploy en TEST (branche develop) ─────────────────────────────
  deploy-test:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to quiz-live-test
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name quiz-live-test \
              --resource-group msaidi \
              --image ororck/quiz-live:${{ github.sha }} \
              --revision-suffix sha${GITHUB_SHA::6} \
              --min-replicas 0 --max-replicas 1

  # ─── 3. Deploy en PROD (main uniquement, gate manuel) ────────────────
  deploy-prod:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to quiz-live (prod)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name quiz-live \
              --resource-group msaidi \
              --image ororck/quiz-live:${{ github.sha }} \
              --revision-suffix sha${GITHUB_SHA::6} \
              --min-replicas 0 --max-replicas 1
